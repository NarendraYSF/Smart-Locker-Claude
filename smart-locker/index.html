<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0B1410" />
    <title>Loker Pintar FST &mdash; UIN Syarif Hidayatullah Jakarta</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles/tokens.css" />
    <link rel="stylesheet" href="styles/base.css" />
    <link rel="stylesheet" href="styles/layout.css" />
    <link rel="stylesheet" href="styles/components.css" />
    <link rel="stylesheet" href="styles/motion.css" />
    <link rel="stylesheet" href="styles/screens.css" />
  </head>
  <body>
    <div class="kiosk" data-kiosk>
      <div class="kiosk__backdrop" aria-hidden="true">
        <div class="kiosk__pattern"></div>
        <div class="kiosk__glow kiosk__glow--one"></div>
        <div class="kiosk__glow kiosk__glow--two"></div>
      </div>

      <header class="kiosk__header" aria-hidden="false">
        <div class="kiosk__brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <div class="brand-text">
            <p class="brand-text__eyebrow">Fakultas Sains dan Teknologi</p>
            <p class="brand-text__title">UIN Syarif Hidayatullah Jakarta</p>
          </div>
        </div>
        <div class="kiosk__meta">
          <p class="kiosk__meta-date" data-clock-date>&mdash;</p>
          <p class="kiosk__meta-time" data-clock-time>--:--</p>
        </div>
      </header>

      <main class="kiosk__stage" data-screen="idle" data-stage>
        <!-- Screens are mounted here by scripts/app.js -->
      </main>

      <footer class="kiosk__footer">
        <p class="kiosk__footer-line">Loker Pintar FST &middot; Untuk Dosen dan Tenaga Kependidikan</p>
        <p class="kiosk__footer-line kiosk__footer-line--muted">
          Bantuan: Sekretariat FST, Gedung Utama Lt. 1
        </p>
      </footer>

      <div class="toast-host" data-toast-host aria-live="polite"></div>
    </div>

    <script type="module" src="scripts/app.js"></script>
  </body>
</html>
