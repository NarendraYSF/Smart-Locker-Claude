<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loker Pintar FST — Product &amp; UX Review</title>
<style>
  :root {
    --ink: #1c2333;
    --ink-2: #5b6478;
    --ink-3: #8b93a7;
    --paper: #fbfaf7;
    --surface: #ffffff;
    --stroke: #e3e1da;
    --navy: #1f2a44;
    --gold: #b8860b;
    --gold-soft: #f6efdc;
    --danger: #b03a2e;
    --danger-soft: #f9e9e7;
    --warn: #b06f00;
    --warn-soft: #faf1de;
    --ok: #2e7d4f;
    --ok-soft: #e8f2ec;
    --info: #2b5f8a;
    --info-soft: #e8eff5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.55;
    font-size: 15px;
  }
  .wrap { max-width: 1000px; margin: 0 auto; padding: 40px 28px 64px; }

  /* ---------- header ---------- */
  .topbar {
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 16px; margin-bottom: 8px;
  }
  h1 { font-size: 26px; line-height: 1.25; color: var(--navy); }
  h2 {
    font-size: 19px; color: var(--navy);
    margin: 44px 0 6px; padding-top: 20px;
    border-top: 2px solid var(--navy);
  }
  h3 { font-size: 15px; color: var(--navy); margin: 14px 0 4px; }
  .kicker {
    font-size: 12px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--gold); font-weight: 600; margin-bottom: 6px;
  }
  .meta { color: var(--ink-2); font-size: 13.5px; max-width: 760px; margin-top: 8px; }
  .lead { color: var(--ink-2); font-size: 13.5px; margin-bottom: 12px; max-width: 780px; }

  .lang-toggle { display: flex; gap: 0; border: 1px solid var(--stroke); border-radius: 6px; overflow: hidden; flex-shrink: 0; }
  .lang-toggle button {
    border: none; background: var(--surface); color: var(--ink-2);
    font: inherit; font-size: 13px; font-weight: 600; padding: 6px 14px; cursor: pointer;
  }
  .lang-toggle button.active { background: var(--navy); color: #fff; }

  /* ---------- stats ---------- */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin: 24px 0 6px; }
  .stat { background: var(--surface); border: 1px solid var(--stroke); border-radius: 8px; padding: 14px 16px; }
  .stat .v { font-size: 28px; font-weight: 700; line-height: 1.1; }
  .stat .l { font-size: 12.5px; color: var(--ink-2); margin-top: 2px; }
  .stat.danger .v { color: var(--danger); }
  .stat.success .v { color: var(--ok); }
  .stat.warning .v { color: var(--warn); }

  /* ---------- callouts ---------- */
  .callout { border-radius: 8px; padding: 14px 16px; margin: 18px 0; font-size: 13.5px; border: 1px solid; }
  .callout b.title { display: block; margin-bottom: 3px; font-size: 13.5px; }
  .callout.warning { background: var(--warn-soft); border-color: #e5cfa0; }
  .callout.warning b.title { color: var(--warn); }
  .callout.info { background: var(--info-soft); border-color: #c4d5e3; }
  .callout.info b.title { color: var(--info); }

  /* ---------- cards ---------- */
  .cards3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin: 14px 0; }
  .card { background: var(--surface); border: 1px solid var(--stroke); border-radius: 8px; overflow: hidden; }
  .card-h {
    display: flex; justify-content: space-between; align-items: center; gap: 8px;
    padding: 10px 14px; border-bottom: 1px solid var(--stroke);
    font-weight: 600; font-size: 14px; color: var(--navy);
  }
  .card-b { padding: 12px 14px; font-size: 13px; }
  .card-b .quote { color: var(--ink-2); font-style: italic; margin-bottom: 8px; }
  .card-b .gap { color: var(--ink-2); margin-top: 8px; }
  .pill {
    font-size: 11px; font-weight: 600; padding: 2px 9px; border-radius: 999px;
    background: var(--gold-soft); color: var(--gold); white-space: nowrap;
  }

  /* ---------- tables ---------- */
  table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 13px; background: var(--surface); }
  th {
    text-align: left; font-size: 11.5px; text-transform: uppercase; letter-spacing: .06em;
    color: var(--ink-2); padding: 8px 10px; border-bottom: 2px solid var(--navy);
  }
  td { padding: 9px 10px; border-bottom: 1px solid var(--stroke); vertical-align: top; }
  tr.sev-danger td:first-child { box-shadow: inset 3px 0 0 var(--danger); }
  tr.sev-warning td:first-child { box-shadow: inset 3px 0 0 var(--warn); }
  tr.sev-info td:first-child { box-shadow: inset 3px 0 0 var(--info); }
  td.c, th.c { text-align: center; }
  .sev-tag { font-weight: 600; }
  .sev-tag.danger { color: var(--danger); }
  .sev-tag.warning { color: var(--warn); }
  .sev-tag.info { color: var(--info); }
  .sev-tag.neutral { color: var(--ink-2); }

  /* ---------- charts ---------- */
  .chart-block { background: var(--surface); border: 1px solid var(--stroke); border-radius: 8px; padding: 18px 18px 12px; margin: 14px 0; }
  .chart-title { font-size: 14px; font-weight: 600; color: var(--navy); margin-bottom: 2px; }
  .chart-sub { font-size: 12px; color: var(--ink-2); margin-bottom: 14px; }
  .chart-cap { font-size: 11.5px; color: var(--ink-3); margin-top: 10px; }
  .charts2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; align-items: stretch; }
  svg text { font-family: inherit; }

  /* hbar (CSS) */
  .hbar-row { display: grid; grid-template-columns: 230px 1fr 58px; gap: 10px; align-items: center; margin: 7px 0; font-size: 12.5px; }
  .hbar-row .lbl { text-align: right; color: var(--ink); line-height: 1.25; }
  .hbar-track { background: #f0eee8; border-radius: 3px; height: 18px; }
  .hbar-fill { height: 100%; border-radius: 3px; background: var(--navy); min-width: 2px; }
  .hbar-fill.gold { background: var(--gold); }
  .hbar-row .val { font-weight: 600; color: var(--ink-2); font-variant-numeric: tabular-nums; }

  .legend { display: flex; flex-wrap: wrap; gap: 14px; font-size: 12px; color: var(--ink-2); margin-top: 8px; }
  .legend span { display: inline-flex; align-items: center; gap: 6px; }
  .legend i { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }

  /* ---------- stories ---------- */
  details { background: var(--surface); border: 1px solid var(--stroke); border-radius: 8px; margin: 10px 0; }
  summary {
    cursor: pointer; padding: 11px 14px; font-weight: 600; font-size: 14px; color: var(--navy);
    display: flex; justify-content: space-between; align-items: center; list-style: none;
  }
  summary::-webkit-details-marker { display: none; }
  summary::after { content: "+"; color: var(--ink-3); font-size: 16px; }
  details[open] summary::after { content: "\2212"; }
  details .body { padding: 0 14px 14px; font-size: 13px; border-top: 1px solid var(--stroke); }
  details .body .story { font-style: italic; color: var(--ink-2); margin: 10px 0; }
  details .body ol { margin-left: 18px; }
  details .body li { margin: 4px 0; }

  footer { margin-top: 48px; padding-top: 14px; border-top: 1px solid var(--stroke); font-size: 12px; color: var(--ink-3); }

  @media (max-width: 760px) {
    .stats, .cards3, .charts2 { grid-template-columns: 1fr; }
    .hbar-row { grid-template-columns: 130px 1fr 52px; }
  }
  @media print {
    body { background: #fff; font-size: 12px; }
    .lang-toggle { display: none; }
    .wrap { padding: 0; max-width: none; }
    h2 { break-after: avoid; }
    .chart-block, .card, table, details { break-inside: avoid; }
  }
</style>
</head>

/* ============================================================
   Chart builders (return SVG / HTML strings)
   ============================================================ */
var C = {
  navy: "#1f2a44", gold: "#b8860b", danger: "#b03a2e",
  warn: "#b06f00", info: "#2b5f8a", grid: "#e8e6df", ink2: "#5b6478", ink3: "#8b93a7"
};

function esc(s) {
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function severityDonut(t) {
  var order = ["danger", "warning", "info"];
  var colors = { danger: C.danger, warning: C.warn, info: C.info };
  var total = 0;
  order.forEach(function (k) { total += SEVERITY[k]; });
  var r = 62, cx = 90, cy = 90, circ = 2 * Math.PI * r, off = -circ / 4;
  var arcs = "";
  order.forEach(function (k) {
    var frac = SEVERITY[k] / total;
    arcs += '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="' + colors[k] +
      '" stroke-width="26" stroke-dasharray="' + (frac * circ - 2) + " " + (circ - frac * circ + 2) +
      '" stroke-dashoffset="' + -off + '"></circle>';
    off += frac * circ;
  });
  var legend = order.map(function (k) {
    return '<span><i style="background:' + colors[k] + '"></i>' + esc(t.sevLabels[k]) + " \u00b7 " + SEVERITY[k] + "</span>";
  }).join("");
  return (
    '<svg viewBox="0 0 180 180" width="180" height="180" role="img" aria-label="' + esc(t.sevChartTitle) + '">' +
    arcs +
    '<text x="90" y="86" text-anchor="middle" font-size="30" font-weight="700" fill="' + C.navy + '">' + total + "</text>" +
    '<text x="90" y="106" text-anchor="middle" font-size="11" fill="' + C.ink2 + '">' + esc(t.stats[0].l) + "</text>" +
    "</svg>" +
    '<div class="legend">' + legend + "</div>"
  );
}

function emotionLine(t) {
  var W = 640, H = 230, padL = 48, padR = 20, padT = 18, padB = 48;
  var iw = W - padL - padR, ih = H - padT - padB;
  var xs = EMOTION.map(function (_, i) { return padL + (iw * i) / (EMOTION.length - 1); });
  var y = function (v) { return padT + ih - ((v - 1) / 4) * ih; };
  var s = "";
  // grid + y labels
  for (var v = 1; v <= 5; v++) {
    s += '<line x1="' + padL + '" y1="' + y(v) + '" x2="' + (W - padR) + '" y2="' + y(v) + '" stroke="' + C.grid + '"/>' +
         '<text x="' + (padL - 10) + '" y="' + (y(v) + 4) + '" text-anchor="end" font-size="11" fill="' + C.ink3 + '">' + v + "</text>";
  }
  // area fill
  var area = "M" + xs[0] + "," + y(EMOTION[0]);
  EMOTION.forEach(function (v, i) { area += " L" + xs[i] + "," + y(v); });
  area += " L" + xs[xs.length - 1] + "," + (padT + ih) + " L" + xs[0] + "," + (padT + ih) + " Z";
  s += '<path d="' + area + '" fill="' + C.gold + '" opacity="0.12"/>';
  // line
  var line = EMOTION.map(function (v, i) { return xs[i] + "," + y(v); }).join(" ");
  s += '<polyline points="' + line + '" fill="none" stroke="' + C.gold + '" stroke-width="2.5"/>';
  // points + value + x labels
  EMOTION.forEach(function (v, i) {
    s += '<circle cx="' + xs[i] + '" cy="' + y(v) + '" r="4.5" fill="' + C.navy + '"/>' +
         '<text x="' + xs[i] + '" y="' + (y(v) - 10) + '" text-anchor="middle" font-size="11.5" font-weight="600" fill="' + C.navy + '">' + v + "</text>" +
         '<text x="' + xs[i] + '" y="' + (H - padB + 18) + '" text-anchor="middle" font-size="11" fill="' + C.ink2 + '">' + esc(t.emoStages[i]) + "</text>";
  });
  // y axis label
  s += '<text x="14" y="' + (padT + ih / 2) + '" text-anchor="middle" font-size="11" fill="' + C.ink3 +
       '" transform="rotate(-90 14 ' + (padT + ih / 2) + ')">' + esc(t.emoAxisY) + "</text>";
  return '<svg viewBox="0 0 ' + W + " " + H + '" style="width:100%;height:auto" role="img" aria-label="' + esc(t.emoChartTitle) + '">' + s + "</svg>";
}

function riceBars(t) {
  var max = RICE[0].score;
  var strategic = { rfid: true, notif: true };
  return RICE.map(function (item) {
    var w = Math.max(0.5, (item.score / max) * 100);
    return (
      '<div class="hbar-row">' +
      '<div class="lbl">' + esc(t.riceLabels[item.key]) + "</div>" +
      '<div class="hbar-track"><div class="hbar-fill' + (strategic[item.key] ? " gold" : "") + '" style="width:' + w + '%"></div></div>' +
      '<div class="val">' + item.score.toLocaleString("en-US") + "</div>" +
      "</div>"
    );
  }).join("");
}

function valueEffortScatter(t) {
  var W = 640, H = 300, padL = 56, padR = 24, padT = 20, padB = 52;
  var iw = W - padL - padR, ih = H - padT - padB;
  var maxE = 6.5, maxS = 56; // sqrt(3000) ~ 54.8
  var X = function (e) { return padL + (e / maxE) * iw; };
  var Y = function (sc) { return padT + ih - (Math.sqrt(sc) / maxS) * ih; };
  var s = "";
  // gridlines x (weeks) and y (score ticks at sqrt positions)
  [0, 1, 2, 3, 4, 5, 6].forEach(function (w) {
    s += '<line x1="' + X(w) + '" y1="' + padT + '" x2="' + X(w) + '" y2="' + (padT + ih) + '" stroke="' + C.grid + '"/>' +
         '<text x="' + X(w) + '" y="' + (padT + ih + 16) + '" text-anchor="middle" font-size="11" fill="' + C.ink3 + '">' + w + "</text>";
  });
  [100, 500, 1000, 2000, 3000].forEach(function (v) {
    s += '<line x1="' + padL + '" y1="' + Y(v) + '" x2="' + (W - padR) + '" y2="' + Y(v) + '" stroke="' + C.grid + '"/>' +
         '<text x="' + (padL - 8) + '" y="' + (Y(v) + 4) + '" text-anchor="end" font-size="11" fill="' + C.ink3 + '">' + v.toLocaleString("en-US") + "</text>";
  });
  // quick-win zone divider at 1 week
  s += '<line x1="' + X(1) + '" y1="' + padT + '" x2="' + X(1) + '" y2="' + (padT + ih) + '" stroke="' + C.ink3 + '" stroke-dasharray="4 4"/>';
  // points; manual label offsets to avoid overlap
  var dxy = {
    bugs: [8, 4], timeout: [8, 4], rfid: [8, 4], notif: [8, -8],
    search: [8, -8], receipt: [8, 12], help: [8, 4], admin: [-8, -8], pin: [8, 4]
  };
  var strategic = { rfid: true, notif: true };
  RICE.forEach(function (item) {
    var x = X(item.effort), y = Y(item.score);
    var col = strategic[item.key] ? C.gold : C.navy;
    var d = dxy[item.key];
    var anchor = d[0] < 0 ? "end" : "start";
    s += '<circle cx="' + x + '" cy="' + y + '" r="6" fill="' + col + '"/>' +
         '<text x="' + (x + d[0]) + '" y="' + (y + d[1]) + '" text-anchor="' + anchor + '" font-size="11" fill="' + C.ink2 + '">' + esc(t.riceShort[item.key]) + "</text>";
  });
  // axis labels
  s += '<text x="' + (padL + iw / 2) + '" y="' + (H - 8) + '" text-anchor="middle" font-size="11.5" fill="' + C.ink2 + '">' + esc(t.scatterX) + "</text>" +
       '<text x="16" y="' + (padT + ih / 2) + '" text-anchor="middle" font-size="11.5" fill="' + C.ink2 +
       '" transform="rotate(-90 16 ' + (padT + ih / 2) + ')">' + esc(t.scatterY) + "</text>";
  return '<svg viewBox="0 0 ' + W + " " + H + '" style="width:100%;height:auto" role="img" aria-label="' + esc(t.scatterTitle) + '">' + s + "</svg>";
}

/* ============================================================
   Page render
   ============================================================ */
function tableHTML(headers, rows, opts) {
  opts = opts || {};
  var th = headers.map(function (h, i) {
    return "<th" + ((opts.center || []).indexOf(i) >= 0 ? ' class="c"' : "") + ">" + esc(h) + "</th>";
  }).join("");
  var body = rows.map(function (r, ri) {
    var cls = opts.rowClass ? opts.rowClass(r, ri) : "";
    var tds = r.map(function (cell, ci) {
      var c = (opts.center || []).indexOf(ci) >= 0 ? ' class="c"' : "";
      return "<td" + c + ">" + cell + "</td>";
    }).join("");
    return "<tr" + (cls ? ' class="' + cls + '"' : "") + ">" + tds + "</tr>";
  }).join("");
  return "<table><thead><tr>" + th + "</tr></thead><tbody>" + body + "</tbody></table>";
}

function render(lang) {
  var t = T[lang];
  document.documentElement.lang = lang;
  document.title = t.title;

  var statsHTML = t.stats.map(function (s) {
    return '<div class="stat ' + s.cls + '"><div class="v">' + esc(s.v) + '</div><div class="l">' + esc(s.l) + "</div></div>";
  }).join("");

  var personasHTML = t.personas.map(function (p) {
    return (
      '<div class="card"><div class="card-h">' + esc(p.name) + '<span class="pill">' + esc(p.tag) + "</span></div>" +
      '<div class="card-b"><div class="quote">' + esc(p.quote) + "</div><div>" + esc(p.desc) + '</div><div class="gap">' + esc(p.gap) + "</div></div></div>"
    );
  }).join("");

  var journeyRows = t.journey.map(function (r) { return r.map(esc); });
  var journeyHTML = tableHTML(t.journeyHead, journeyRows, { center: [4] });

  var findingRows = t.findings.map(function (f, i) {
    var sev = f[2];
    return [String(i + 1), esc(f[0]), esc(f[1]), '<span class="sev-tag ' + sev + '">' + esc(t.sevWord[sev]) + "</span>"];
  });
  var auditHTML = tableHTML(t.auditHead, findingRows, {
    center: [0],
    rowClass: function (_, ri) { return "sev-" + t.findings[ri][2]; }
  });

  var sprintRows = t.sprint.map(function (r) { return r.map(esc); });
  var sprintHTML = tableHTML(t.sprintHead, sprintRows, { center: [2] });

  var storiesHTML = t.stories.map(function (st) {
    var ac = st.ac.map(function (a) { return "<li>" + esc(a) + "</li>"; }).join("");
    return (
      "<details" + (st.open ? " open" : "") + "><summary><span>" + esc(st.title) +
      ' <span class="pill" style="margin-left:8px">' + esc(st.pts) + "</span></span></summary>" +
      '<div class="body"><p class="story">' + esc(st.story) + "</p><ol>" + ac + "</ol></div></details>"
    );
  }).join("");

var initial = new URLSearchParams(location.search).get("lang");
render(initial === "id" ? "id" : "en");

// expand all collapsibles when printing, restore after
var openedForPrint = [];
window.addEventListener("beforeprint", function () {
  openedForPrint = [];
  document.querySelectorAll("details:not([open])").forEach(function (d) {
    d.setAttribute("open", "");
    openedForPrint.push(d);
  });
});
window.addEventListener("afterprint", function () {
  openedForPrint.forEach(function (d) { d.removeAttribute("open"); });
  openedForPrint = [];
});
